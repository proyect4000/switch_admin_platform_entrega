services:
  db:
    image: postgres:15
    container_name: switch_postgres
    restart: always
    environment:
      POSTGRES_DB: switch_admin_db
      POSTGRES_USER: switch_user
      POSTGRES_PASSWORD: switch_password
    ports:
      - "5432:5432"
    volumes:
      - switch_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: switch_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: switch_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  switch_postgres_data:
